name: Build NodeWorm Installer

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      # Restore or generate the extension signing key.
      # The PEM is stored as a GitHub secret so the extension ID stays stable.
      - name: Restore extension key
        shell: pwsh
        run: |
          if ("${{ secrets.EXTENSION_KEY_PEM }}" -ne "") {
            [System.IO.File]::WriteAllText("extension-key.pem", "${{ secrets.EXTENSION_KEY_PEM }}")
            Write-Host "Extension key restored from secret."
          } else {
            Write-Host "No secret found; a fresh key (new extension ID) will be generated."
          }

      - name: Pack Chrome extension (CRX3)
        run: node scripts/pack-crx.js

      - name: Compile NodeWorm Agent (Node SEA -> standalone exe)
        shell: pwsh
        run: |
          # Node.js Single Executable Applications (stable since Node 21, works on 22/24)
          '{"main":"public/agent/nodeworm-agent.js","output":"sea-prep.blob","disableExperimentalSEAWarning":true}' | Out-File sea-config.json -Encoding UTF8
          node --experimental-sea-config sea-config.json
          Copy-Item (Get-Command node).Source installer/nodeworm-agent.exe -Force
          npx postject installer/nodeworm-agent.exe NODE_SEA_BLOB sea-prep.blob --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2 --overwrite

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Build installer EXE
        working-directory: installer
        run: makensis setup.nsi
        shell: cmd

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: NodeWorm-Setup
          path: installer/NodeWorm-Setup.exe
          retention-days: 30

      # On version tags, create a GitHub Release with the installer attached.
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/NodeWorm-Setup.exe
          generate_release_notes: true
