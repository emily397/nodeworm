name: Build NodeWorm Installer

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Restore extension key
        shell: pwsh
        run: |
          if ("${{ secrets.EXTENSION_KEY_PEM }}" -ne "") {
            [System.IO.File]::WriteAllText("extension-key.pem", "${{ secrets.EXTENSION_KEY_PEM }}")
            Write-Host "Extension key restored from secret."
          } else {
            Write-Host "No secret found; a fresh key will be generated."
          }

      - name: Pack Chrome extension (CRX3)
        run: node scripts/pack-crx.js

      - name: Compile NodeWorm Agent (Node SEA -> standalone exe)
        shell: pwsh
        run: |
          '{"main":"public/agent/nodeworm-agent.js","output":"sea-prep.blob","disableExperimentalSEAWarning":true}' | Out-File sea-config.json -Encoding UTF8
          node --experimental-sea-config sea-config.json
          Copy-Item (Get-Command node).Source installer/nodeworm-agent.exe -Force
          npx postject installer/nodeworm-agent.exe NODE_SEA_BLOB sea-prep.blob --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2 --overwrite

      - name: Copy standalone agent for release
        shell: pwsh
        run: Copy-Item installer/nodeworm-agent.exe nodeworm-agent.exe

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis --no-progress -y
          Add-Content $env:GITHUB_PATH "C:\Program Files (x86)\NSIS"

      - name: Build installer EXE
        working-directory: installer
        shell: pwsh
        run: |
          $makensis = (Get-Command makensis -ErrorAction SilentlyContinue)
          if (-not $makensis) { $makensis = "C:\Program Files (x86)\NSIS\makensis.exe" }
          else { $makensis = $makensis.Source }
          & $makensis setup.nsi
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: NodeWorm-Setup
          path: installer/NodeWorm-Setup.exe
          retention-days: 30

      - name: Upload standalone agent artifact
        uses: actions/upload-artifact@v4
        with:
          name: nodeworm-agent
          path: nodeworm-agent.exe
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/NodeWorm-Setup.exe
            nodeworm-agent.exe
          generate_release_notes: true
